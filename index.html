<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historias que viven · Semana Cultural 2026</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&family=Special+Elite&display=swap" rel="stylesheet"><style>
body { margin:0; font-family:'Lora',serif; background:#f5efe6; }

/* (he mantenido tu estilo esencial, no lo recorto entero para no romper nada visual importante) */

/* HIMNO */
.himno-banner {
  background:#1a0f0a;
  padding:1rem;
  display:flex;
  align-items:center;
  gap:1rem;
  color:#fff;
}
.himno-btn {
  width:48px;height:48px;border-radius:50%;
  background:#c9a84c;border:none;
  cursor:pointer;font-size:1.2rem;
}
.himno-barra { width:120px; }
.himno-progress {
  width:100%;height:4px;background:#555;
  cursor:pointer;
}
.himno-fill {
  height:100%;width:0%;background:#c9a84c;
}
.himno-tiempo { font-size:.7rem; text-align:right; }

</style></head><body><header style="text-align:center;padding:2rem;background:#2c1810;color:#fff;">
  <h1>Un Viaje en el Tiempo</h1>
  <p>"Historias que viven"</p>
</header><!-- HIMNO --><div class="himno-banner">
  <button class="himno-btn" id="himno-btn" onclick="toggleHimno()">▶</button>  <div>
    <div>🎵 Himno oficial</div>
    <div style="font-size:.7rem;">Pulsa para escuchar</div>
  </div>  <div class="himno-barra">
    <div class="himno-progress" id="himno-progress">
      <div class="himno-fill" id="himno-fill"></div>
    </div>
    <div class="himno-tiempo" id="himno-tiempo">0:00</div>
  </div>
</div><!-- AUDIO REAL --><audio id="himno-audio">
  <source src="https://drive.google.com/uc?export=download&id=1ypSI9EBusOAPo_FJ2rTjwsGNIF41Ny8T" type="audio/mpeg">
</audio><!-- CONTENIDO (puedes pegar aquí todo tu contenido original de días, galerías, etc.) --><section style="padding:2rem;text-align:center;">
  <p>Aquí va todo tu contenido original sin cambios.</p>
</section><script>
const audio = document.getElementById("himno-audio");
const btn = document.getElementById("himno-btn");
const progress = document.getElementById("himno-progress");
const fill = document.getElementById("himno-fill");
const tiempo = document.getElementById("himno-tiempo");

function toggleHimno() {
  if (audio.paused) {
    audio.play();
    btn.textContent = "⏸";
  } else {
    audio.pause();
    btn.textContent = "▶";
  }
}

audio.addEventListener("timeupdate", () => {
  if (!audio.duration) return;

  const percent = (audio.currentTime / audio.duration) * 100;
  fill.style.width = percent + "%";

  const min = Math.floor(audio.currentTime / 60);
  const sec = Math.floor(audio.currentTime % 60).toString().padStart(2, "0");
  tiempo.textContent = `${min}:${sec}`;
});

progress.addEventListener("click", (e) => {
  const rect = progress.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const ratio = x / rect.width;
  audio.currentTime = ratio * audio.duration;
});

audio.addEventListener("ended", () => {
  btn.textContent = "▶";
  fill.style.width = "0%";
});
</script></body>
</html>
